# nomos_beam CI — Elixir / Phoenix test suite
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-and-test:
    name: Elixir (system) / ubuntu-24.04
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Elixir and OTP
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y elixir erlang-dev erlang-parsetools
          mix local.hex --force
      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ubuntu-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ubuntu-mix-
      - name: Cache _build
        uses: actions/cache@v4
        with:
          path: _build
          key: ubuntu-build-${{ hashFiles('mix.lock') }}
          restore-keys: ubuntu-build-
      - run: mix deps.get
      - run: mix compile
      - run: mix test
