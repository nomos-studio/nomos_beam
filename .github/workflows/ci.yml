# nomos_beam CI — Elixir / Phoenix test suite
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-and-test:
    name: Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {elixir: "1.18", otp: "27", os: "macos-latest"}
          - {elixir: "1.18", otp: "27", os: "ubuntu-24.04"}
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1.24.1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
          install-hex: false
          install-rebar: false
      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ matrix.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ matrix.os }}-mix-
      - name: Cache _build
        uses: actions/cache@v4
        with:
          path: _build
          key: ${{ matrix.os }}-build-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ matrix.os }}-build-
      - run: mix deps.get
      - run: mix compile
      - run: mix test

